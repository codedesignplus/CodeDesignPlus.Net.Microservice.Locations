syntax = "proto3";

import "google/protobuf/wrappers.proto";

option csharp_namespace = "CodeDesignPlus.Net.Microservice.Locations.gRpc";

package currency; 

service CurrencyService {
  rpc GetCurrency (GetCurrencyRequest) returns (GetCurrencyResponse);
}

message GetCurrencyRequest {
  google.protobuf.StringValue id = 1;
  google.protobuf.StringValue code = 2;
  google.protobuf.Int32Value numeric_code = 3;
  google.protobuf.StringValue name = 4;
}

message GetCurrencyResponse {
  string id = 1;
  string name = 2;
  string code = 3;
  int32 numeric_code = 4;
  int32 decimal_digits = 5;
  string symbol = 6;
}